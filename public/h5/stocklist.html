<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Watchlist — H5</title>
  <style>
    :root{--bg:#ffffff;--muted:#6b7280;--green:#10b981;--red:#ef4444;--card:#f8fafc}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;line-height:1.4;background:#f3f4f6;margin:0;padding:24px}
    .card{background:var(--bg);border-radius:10px;box-shadow:0 1px 2px rgba(0,0,0,.05);overflow:hidden;margin:0 auto}
    .card .header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e6edf3}
    .title{display:flex;align-items:center;gap:10px;font-weight:600}
    .controls{display:flex;gap:8px;align-items:center}
    input.search{padding:6px 10px;border-radius:6px;border:1px solid #d1d5db;font-size:14px;width:180px}
    select.sort{padding:6px 8px;border-radius:6px;border:1px solid #d1d5db;font-size:13px}
    ul.list{list-style:none;margin:0;padding:0}
    li.item{display:flex;justify-content:space-between;gap:4px;padding:6px 10px;align-items:center;border-bottom:1px solid #f1f5f9;cursor:pointer}
    li.item:hover{background:#fbfdff}
    .left .ticker{font-weight:600}
    .muted{color:var(--muted);font-size:12px}
    .badges{display:flex;gap:6px}
    .badge{padding:4px 8px;border-radius:6px;font-size:12px}
    .tp{background:#ecfdf5;color:var(--green)}
    .sl{background:#fff1f2;color:var(--red)}
    .entry{font-weight:700}
    .row-info{font-size:13px;color:#374151}
    .reload{background:none;border:0;color:#2563eb;cursor:pointer;font-size:14px}
    .center{text-align:center;padding:12px;color:var(--muted)}
    @media (max-width:520px){.controls{flex-direction:column;align-items:stretch}.title{font-size:16px}}
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="title">👁 Watchlist</div>
      <div class="controls">
        <input class="search" id="q" placeholder="Search ticker or name" />
        <select id="sort" class="sort"><option value="Profit">Sort: Profit</option><option value="Price">Sort: Price</option></select>
        <button id="reload" class="reload">⟳ Reload</button>
      </div>
    </div>

    <div id="status" class="center">Loading...</div>

    <ul id="list" class="list" style="display:none"></ul>

    <div class="center" style="padding:10px;font-size:13px;color:#94a3b8">· Click a row to log stock data ·</div>
  </div>

  <!-- Modal -->
  <div id="analysisModal" style="display:none;position:fixed;inset:0;background:rgba(2,6,23,0.6);z-index:9999;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:8px;max-width:820px;width:92%;max-height:80vh;overflow:auto;padding:16px;box-shadow:0 10px 30px rgba(2,6,23,0.4)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-weight:700">Analysis</div>
        <button id="modalClose" style="background:none;border:0;font-size:18px;cursor:pointer">✕</button>
      </div>
      <div id="modalBody" style="font-size:14px;color:#0f172a;line-height:1.5"></div>
    </div>
  </div>

  <script>
    const listEl = document.getElementById('list');
    const statusEl = document.getElementById('status');
    const qEl = document.getElementById('q');
    const sortEl = document.getElementById('sort');
    const reloadBtn = document.getElementById('reload');

    let stocks = [];

    async function fetchStocks(){
      statusEl.textContent = 'Loading...';
      statusEl.style.display = '';
      listEl.style.display = 'none';
      try{
        const res = await fetch('/api/trading-plus/strategy/trading?page=1&page_size=1000',{
          method:'POST',headers:{'Content-Type':'application/json'},body: JSON.stringify({})
        });
        if(!res.ok) throw new Error('HTTP '+res.status);
        const data = await res.json();
        stocks = (data.data.items||[]).map(item=>({
          ticker:item.stock_code,
          name:item.stock_name,
          price:parseFloat(item.entry_price||0),
          take_profit:parseFloat(item.take_profit||0),
          stop_loss:parseFloat(item.stop_loss||0),
          strategy_name:item.strategy_name||'',
          holding:!!item.holding
        }));
        render();
      }catch(e){
        statusEl.textContent = 'Failed to load stock data.';
        console.error(e);
      }
    }

    function render(){
      const q = (qEl.value||'').trim().toLowerCase();
      const sortBy = sortEl.value;
      let filtered = stocks.filter(s=>s.ticker.toLowerCase().includes(q)||s.name.toLowerCase().includes(q));
      filtered.sort((a,b)=> sortBy==='Price' ? b.price - a.price : ((b.take_profit - b.price) - (a.take_profit - a.price)));

      listEl.innerHTML = '';
      if(filtered.length===0){
        statusEl.textContent = 'No stocks found.';
        statusEl.style.display = '';
        listEl.style.display = 'none';
        return;
      }

      statusEl.style.display = 'none';
      listEl.style.display = '';

      filtered.forEach(s=>{
        const li = document.createElement('li');
        li.className = 'item';
        li.innerHTML = `
          <div class="left">
            <div style="display:flex;align-items:center;gap:4px">
              <span style="width:10px;height:10px;border-radius:50%;background:${s.holding? '#ef4444':'#fff'};border:${s.holding? '':'2px solid #d1d5db'};display:inline-block"></span>
              <div>
                <div class="ticker">${s.ticker} <span class="muted">${s.name}</span></div>
                <div class="muted">Market · ${ (s.ticker.split('.').pop()||'').toUpperCase() } ${s.strategy_name}</div>
              </div>
            </div>
          </div>
          <div style="text-align:right">
            <div class="row-info"><span class="muted">Entry:</span> <span class="entry">${s.price.toFixed(2)}</span></div>
            <div class="badges">
              <span class="badge tp">TP ${s.take_profit.toFixed(2)}</span>
              <span class="badge sl">SL ${s.stop_loss.toFixed(2)}</span>
            </div>
          </div>
        `;
        li.addEventListener('click',()=>{ fetchAnalysis(s.ticker); });
        listEl.appendChild(li);
      });
    }

    qEl.addEventListener('input', ()=> render());
    sortEl.addEventListener('change', ()=> render());
    reloadBtn.addEventListener('click', ()=> fetchStocks());

    // Modal helpers
    const modal = document.getElementById('analysisModal');
    const modalBody = document.getElementById('modalBody');
    const modalClose = document.getElementById('modalClose');
    function openModal(){
      if(modal) modal.style.display = 'flex';
    }
    function closeModal(){
      if(modal) modal.style.display = 'none';
      if(modalBody) modalBody.innerHTML = '';
    }
    modalClose?.addEventListener('click', closeModal);
    modal?.addEventListener('click', (e)=>{ if(e.target === modal) closeModal(); });

    async function fetchAnalysis(ticker){
      try{
        if(modalBody) modalBody.innerHTML = '<div style="text-align:center;padding:20px;color:#6b7280">Loading analysis...</div>';
        openModal();
        const res = await fetch('/api/trading-plus/analysis/stock?code='+encodeURIComponent(ticker));
        if(!res.ok){
          modalBody.innerHTML = '<div style="color:#ef4444">Failed to load analysis: HTTP '+res.status+'</div>';
          return;
        }
        const json = await res.json();
        if(json.code !== 0 || !json.data){
          modalBody.innerHTML = '<div style="color:#ef4444">No analysis available.</div>';
          return;
        }
        const info = json.data;
        // render key fields
        let html = '';
        html += `<div style="margin-bottom:8px"><strong>Ticker:</strong> ${ticker}</div>`;
        if(info.support) html += `<div><strong>Support:</strong> ${info.support}</div>`;
        if(info.resistance) html += `<div><strong>Resistance:</strong> ${info.resistance}</div>`;
        if(info.turning && Array.isArray(info.turning)) html += `<div style="margin-top:8px"><strong>Turning points:</strong><pre style="white-space:pre-wrap;margin:6px 0;background:#f8fafc;padding:8px;border-radius:6px">${JSON.stringify(info.turning,null,2)}</pre></div>`;
        if(info.candlestick_patterns) html += `<div style="margin-top:8px"><strong>Candlestick patterns:</strong><pre style="white-space:pre-wrap;margin:6px 0;background:#f8fafc;padding:8px;border-radius:6px">${JSON.stringify(info.candlestick_patterns,null,2)}</pre></div>`;
        if(typeof info.candlestick_signal !== 'undefined') html += `<div style="margin-top:8px"><strong>Candlestick signal:</strong> ${info.candlestick_signal}</div>`;
        // fallback: show raw data for anything else
        const rest = {...info}; delete rest.support; delete rest.resistance; delete rest.turning; delete rest.candlestick_patterns; delete rest.candlestick_signal;
        html += `<div style="margin-top:12px"><strong>Raw:</strong><pre style="white-space:pre-wrap;margin:6px 0;background:#fff;padding:8px;border-radius:6px;border:1px solid #eef2f7;max-height:240px;overflow:auto">${JSON.stringify(rest,null,2)}</pre></div>`;
        if(modalBody) modalBody.innerHTML = html;
      }catch(e){
        if(modalBody) modalBody.innerHTML = '<div style="color:#ef4444">Error loading analysis.</div>';
        console.error(e);
      }
    }

    // initial load
    fetchStocks();
  </script>
</body>
</html>
